<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LOML</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&display=swap" rel="stylesheet">

<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    overflow: hidden;
    font-family: 'Lato', system-ui, sans-serif;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;

    height: 100vh;
    height: 100dvh;
    width: 100vw;
  }

  #container {
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    position: relative;
    pointer-events: none;
    opacity: 0;
    transition: opacity 1.2s ease-out, filter 1.2s ease-out;
  }

  #c {
    width: 100%;
    height: 100%;
    display: block;
  }

  #heart-outline-container {
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
    z-index: 101;
    will-change: transform;
  }

  #heart-outline {
    width: 100%;
    height: auto;
    display: block;
  }

  .bar {
    position: absolute;
    background: #000;
    z-index: 100;
  }

  #heart-name {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -58%);
    z-index: 102;
    font-family: 'Dancing Script', cursive;
    font-weight: 600;
    color: #fff;
    white-space: nowrap;
    text-shadow:
      0 0 12px rgba(255, 210, 235, 0.9),
      0 0 24px rgba(255, 120, 190, 0.6),
      0 0 42px rgba(255, 60, 150, 0.35);
    opacity: 0;
    transition: opacity 1.5s ease-out 0.6s;
  }

  #heart-name.visible {
    opacity: 1;
  }
</style>
</head>

<body>

<div id="heart-outline-container">
  <img id="heart-outline" src="https://i.imgur.com/AnuluF0.png" alt="">
  <div id="heart-name">PAOLA</div>
  <div id="top" class="bar"></div>
  <div id="bottom" class="bar"></div>
  <div id="left" class="bar"></div>
  <div id="right" class="bar"></div>
</div>

<div id="container">
  <canvas id="c"></canvas>
</div>

<script>
(function () {
  "use strict";

  document.addEventListener("gesturestart", e => e.preventDefault());
  document.addEventListener("touchmove", e => {
    if (e.scale && e.scale !== 1) e.preventDefault();
  }, { passive: false });

  const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  const container = document.getElementById('container');
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const heartContainer = document.getElementById('heart-outline-container');
  const heartImg = document.getElementById('heart-outline');
  const heartName = document.getElementById('heart-name');
  const bars = {
    top: document.getElementById('top'),
    bottom: document.getElementById('bottom'),
    left: document.getElementById('left'),
    right: document.getElementById('right')
  };

  const isSmallScreen = window.innerWidth < 600;
  const PARTICLES_PER_FRAME = prefersReducedMotion ? 0 : (isSmallScreen ? 5 : 12);
  const MAX_PARTICLES = isSmallScreen ? 220 : 450; 
  const HUE_STEP = 0.5;

  let particles = [];
  let hue = 350;
  let dpr = Math.min(window.devicePixelRatio || 1, 2); 
  let w = 0, h = 0;
  let heartNaturalRatio = 1; 
  let rafId = null;
  let running = true;

  function layoutHeart() {
    const diagonal = Math.sqrt(window.innerWidth ** 2 + window.innerHeight ** 2);
    const heartWidth = diagonal * 0.35;
    const heartHeight = heartWidth * heartNaturalRatio;

    const x = window.innerWidth / 2 - heartWidth / 2;
    const y = window.innerHeight / 2 - heartHeight / 2;

    heartContainer.style.width = heartWidth + 'px';
    heartContainer.style.transform = `translate(${x}px, ${y}px)`;

  
    heartName.style.fontSize = Math.max(heartWidth * 0.15, 16) + 'px';
    heartName.style.letterSpacing = (heartWidth * 0.004) + 'px';

    const hw = heartWidth * 0.005; 
    bars.top.style.width = window.innerWidth + 'px';
    bars.top.style.height = window.innerHeight + 'px';
    bars.top.style.top = (-window.innerHeight + hw) + 'px';
    bars.top.style.left = (-x) + 'px';

    bars.bottom.style.width = window.innerWidth + 'px';
    bars.bottom.style.height = window.innerHeight + 'px';
    bars.bottom.style.bottom = (-window.innerHeight + hw) + 'px';
    bars.bottom.style.left = (-x) + 'px';

    bars.left.style.width = window.innerWidth + 'px';
    bars.left.style.height = window.innerHeight + 'px';
    bars.left.style.left = (-window.innerWidth + hw) + 'px';
    bars.left.style.top = (-y) + 'px';

    bars.right.style.width = window.innerWidth + 'px';
    bars.right.style.height = window.innerHeight + 'px';
    bars.right.style.right = (-window.innerWidth + hw) + 'px';
    bars.right.style.top = (-y) + 'px';

    return { x, y, width: heartWidth, height: heartHeight };
  }

  function resizeCanvas() {
    const diagonal = Math.sqrt(window.innerWidth ** 2 + window.innerHeight ** 2);

    container.style.opacity = 1;
    container.style.filter = `blur(${diagonal * 0.01}px)`;

    layoutHeart();

    w = window.innerWidth;
    h = window.innerHeight;

    dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = w * dpr;
    canvas.height = h * dpr;

    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function loadHeartImage() {
    return new Promise((resolve) => {
      if (heartImg.complete && heartImg.naturalWidth) {
        resolve();
        return;
      }
      heartImg.addEventListener('load', resolve, { once: true });
      heartImg.addEventListener('error', resolve, { once: true }); 
    });
  }

  function Particle(hc) {
    const rMin = hc.width * 0.01;
    const rMax = hc.width * 0.05;
    this.r = Math.random() * (rMax - rMin) + rMin;
    this.rInc = this.r * 0.05;

    this.x = Math.random() * hc.width + hc.x;
    this.y = Math.random() * hc.height + hc.y;

    this.hue = Math.random() * 40 + 280;
    this.saturation = 100;
    this.light = Math.random() * 70 + 30;
    this.opacity = 0;
    this.opacityInc = Math.random() * 0.01 + 0.005;
    this.dead = false;
  }

  Particle.prototype.draw = function () {
    this.r += this.rInc;
    this.rInc *= 0.99;

    this.opacity += this.opacityInc;
    if (this.opacity >= 1) this.opacityInc *= -1;
    if (this.opacity <= 0.01) this.dead = true;

    ctx.beginPath();
    ctx.fillStyle = `hsla(${this.hue},${this.saturation}%,${this.light}%,${this.opacity})`;
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fill();
  };

  function currentHeartBox() {
    const diagonal = Math.sqrt(window.innerWidth ** 2 + window.innerHeight ** 2);
    const heartWidth = diagonal * 0.35;
    const heartHeight = heartWidth * heartNaturalRatio;
    return {
      x: window.innerWidth / 2 - heartWidth / 2,
      y: window.innerHeight / 2 - heartHeight / 2,
      width: heartWidth,
      height: heartHeight
    };
  }

  let frame = 0;

  function render() {
    rafId = requestAnimationFrame(render);
    if (!running) return;

    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = 'rgba(0,0,0,0.05)';
    ctx.fillRect(0, 0, w, h);

    if (particles.length < MAX_PARTICLES) {
      const hc = currentHeartBox();
      const toSpawn = Math.min(PARTICLES_PER_FRAME, MAX_PARTICLES - particles.length);
      for (let i = 0; i < toSpawn; i++) particles.push(new Particle(hc));
    }

    for (let i = particles.length - 1; i >= 0; i--) {
      particles[i].draw();
      if (particles[i].dead) particles.splice(i, 1);
    }

    hue += HUE_STEP;

    frame++;
    if (frame % 2 === 0) {
      canvas.style.filter = `hue-rotate(${hue}deg)`;
    }
  }

  function spawnBurst(x, y) {
    const hc = currentHeartBox();
    const count = Math.min(PARTICLES_PER_FRAME * 2, MAX_PARTICLES - particles.length);
    for (let i = 0; i < count; i++) {
      const p = new Particle(hc);
      p.x = x;
      p.y = y;
      particles.push(p);
    }
  }

  // ---- Events ----
  let resizeTimer = null;
  window.addEventListener("resize", () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(resizeCanvas, 150);
  });
  window.addEventListener("orientationchange", () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(resizeCanvas, 250);
  });

  window.addEventListener("touchstart", e => {
    const t = e.touches[0];
    if (t) spawnBurst(t.clientX, t.clientY);
  }, { passive: true });

  window.addEventListener("mousedown", e => {
    spawnBurst(e.clientX, e.clientY);
  });

  document.addEventListener("visibilitychange", () => {
    running = document.visibilityState === 'visible';
  });

  // ---- Boot ----
  loadHeartImage().then(() => {
    heartNaturalRatio = heartImg.naturalWidth
      ? heartImg.naturalHeight / heartImg.naturalWidth
      : 1;
    resizeCanvas();
    render();
    requestAnimationFrame(() => heartName.classList.add('visible'));
  });
})();
</script>

</body>
</html>
