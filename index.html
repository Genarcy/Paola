<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/1.20.3/TweenMax.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.imagesloaded/4.1.4/imagesloaded.pkgd.min.js"></script>

<style>
html, body {
    margin: 0;
    padding: 0;
    background: black;
    overflow: hidden;
    font-family: 'Lato', sans-serif;
    touch-action: none;
}
#container {
    width: 100vw;
    height: 100vh;
    position: relative;
    pointer-events: none;
    opacity: 0;
}
#c {
    width: 100%;
    height: 100%;
    display: block;
}
#heart-outline-container {
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
    z-index: 101;
}
#heart-outline {
    width: 100%;
    height: auto;
}
.bar {
    position: absolute;
    background: black;
    z-index: 100;
}
</style>
</head>

<body>

<div id="heart-outline-container">
    <img id="heart-outline" src="https://i.imgur.com/AnuluF0.png">
    <div id="top" class="bar"></div>
    <div id="bottom" class="bar"></div>
    <div id="left" class="bar"></div>
    <div id="right" class="bar"></div>
</div>

<div id="container">
    <canvas id="c"></canvas>
</div>

<script>
document.addEventListener("gesturestart", e => e.preventDefault());
document.addEventListener("touchmove", e => { if (e.scale !== 1) e.preventDefault(); }, { passive: false });

window.requestAnimFrame = window.requestAnimationFrame ||
    window.webkitRequestAnimationFrame ||
    window.mozRequestAnimationFrame ||
    function (cb) { return setTimeout(cb, 1000/60); };

let container = $('#container'),
    c = document.getElementById('c'),
    cx = c.getContext('2d'),
    heartContainer = $('#heart-outline-container'),
    heart = $('#heart-outline'),
    bars = {
        top: $('#top'),
        bottom: $('#bottom'),
        left: $('#left'),
        right: $('#right')
    };

let particles = {},
    particleIndex = 0,
    particleNum = (window.innerWidth < 600) ? 6 : 12,
    hue = 350,
    hueInc = 0.5,
    diagonal = 0,
    w, h;

function resizeCanvas() {
    diagonal = Math.sqrt(window.innerWidth**2 + window.innerHeight**2);

    TweenMax.set(container, {
        opacity: 1,
        filter: `blur(${diagonal * 0.01}px)`
    });

    TweenMax.set(heartContainer, {
        width: diagonal * 0.35,
        x: window.innerWidth/2 - (diagonal * 0.35)/2,
        y: window.innerHeight/2 - heartContainer.height()/2
    });

    let hw = heart.width() * 0.005;

    TweenMax.set(bars.top, {
        width: window.innerWidth,
        height: window.innerHeight,
        top: -window.innerHeight + hw,
        left: -heartContainer.offset().left
    });

    TweenMax.set(bars.bottom, {
        width: window.innerWidth,
        height: window.innerHeight,
        bottom: -window.innerHeight + hw,
        left: -heartContainer.offset().left
    });

    TweenMax.set(bars.left, {
        width: window.innerWidth,
        height: window.innerHeight,
        left: -window.innerWidth + hw,
        top: -heartContainer.offset().top
    });

    TweenMax.set(bars.right, {
        width: window.innerWidth,
        height: window.innerHeight,
        right: -window.innerWidth + hw,
        top: -heartContainer.offset().top
    });

    let dpr = window.devicePixelRatio || 1;
    c.width = window.innerWidth * dpr;
    c.height = window.innerHeight * dpr;
    cx.scale(dpr, dpr);

    w = window.innerWidth;
    h = window.innerHeight;
}

heart.imagesLoaded(() => {
    resizeCanvas();
    drawCanvas();
});

window.addEventListener("resize", () => {
    clearTimeout(window._resizeTimer);
    window._resizeTimer = setTimeout(resizeCanvas, 150);
});

function Particle() {
    let hc = heartContainer;

    this.r = Math.random() * (hc.width() * 0.05 - hc.width() * 0.01) + hc.width() * 0.01;
    this.rInc = this.r * 0.05;

    this.x = Math.random() * hc.width() + hc.offset().left;
    this.y = Math.random() * hc.height() + hc.offset().top;

    this.hue = Math.random() * 40 + 280;
    this.saturation = 100;
    this.light = Math.random() * 70 + 30;
    this.opacity = 0;
    this.opacityInc = Math.random() * 0.01 + 0.005;

    particles[particleIndex] = this;
    this.id = particleIndex;
    particleIndex++;
}

Particle.prototype.draw = function () {
    this.r += this.rInc;
    this.rInc *= 0.99;

    this.opacity += this.opacityInc;
    if (this.opacity >= 1) this.opacityInc *= -1;
    if (this.opacity <= 0.01) delete particles[this.id];

    cx.beginPath();
    cx.fillStyle = `hsla(${this.hue},${this.saturation}%,${this.light}%,${this.opacity})`;
    cx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    cx.fill();
};

function drawCanvas() {
    function render() {
        requestAnimFrame(render);

        cx.globalCompositeOperation = 'source-over';
        cx.fillStyle = 'rgba(0,0,0,0.05)';
        cx.fillRect(0, 0, w, h);

        for (let i = 0; i < particleNum; i++) new Particle();

        for (let i in particles) particles[i].draw();

        hue += hueInc;
        TweenMax.set(c, { filter: `hue-rotate(${hue}deg)` });
    }
    render();
}

window.addEventListener("touchstart", e => {
    let t = e.touches[0];
    for (let i = 0; i < particleNum * 2; i++) {
        let p = new Particle();
        p.x = t.clientX;
        p.y = t.clientY;
    }
}, { passive: true });
</script>

</body>
</html>
