<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Heart Particle Effect</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css?family=Lato:100,300,400,700,900" rel="stylesheet">

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- GSAP TweenMax -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/1.20.3/TweenMax.min.js"></script>

<!-- imagesLoaded -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.imagesloaded/4.1.4/imagesloaded.pkgd.min.js"></script>

<style>
body,
html {
    margin: 0;
    padding: 0;
    font-family: 'Lato', sans-serif;
    background-color: black;
    overflow: hidden;
}

h1, h2, h3, h4, h5, h6, p, a, li {
    margin: 0;
    padding: 0;
}

#container {
    width: 100vw;
    height: 100vh;
    position: relative;
    pointer-events: none;
    user-select: none;
    float: left;
    opacity: 0;
}

#c {
    width: 100%;
    height: 100%;
    position: relative;
    float: left;
    z-index: 0;
}

#heart-outline-container {
    position: fixed;
    pointer-events: none;
    user-select: none;
    top: 0;
    left: 0;
    z-index: 101;
}

#heart-outline {
    width: 100%;
    height: auto;
    pointer-events: none;
    user-select: none;
    position: relative;
    float: left;
}

.bar {
    position: absolute;
    background-color: black;
    z-index: 100;
}

#top { left: 0; }
#bottom { left: 0; }
#left { top: 0; }
#right { top: 0; }
</style>
</head>

<body>

<div id="heart-outline-container">
    <img id="heart-outline" src="https://i.imgur.com/AnuluF0.png">
    <div id="top" class="bar"></div>
    <div id="bottom" class="bar"></div>
    <div id="left" class="bar"></div>
    <div id="right" class="bar"></div>
</div>

<div id="container">
    <canvas id="c">Sorry, your browser does not support canvas.</canvas>
</div>

<script>
window.requestAnimFrame = (function () {
    return window.requestAnimationFrame ||
        window.webkitRequestAnimationFrame ||
        window.mozRequestAnimationFrame ||
        function (callback) {
            window.setTimeout(callback, 1000 / 60);
        };
})();

(function () {
    document.addEventListener("touchstart", function () {}, true);
    document.documentElement.addEventListener('touchstart', function (event) {
        if (event.touches.length > 1) event.preventDefault();
    }, false);

    let lastTouchEnd = 0;
    document.documentElement.addEventListener('touchend', function (event) {
        let now = Date.now();
        if (now - lastTouchEnd <= 300) event.preventDefault();
        lastTouchEnd = now;
    }, false);
})();

const random = (min, max) => Math.floor(Math.random() * (max + 1 - min) + min);

let container = $('#container'),
    c = document.getElementById('c'),
    cx = c.getContext('2d'),
    cbg = { rgb: '0,0,0', a: 0.01 },

    heartOutlineContainer = $('#heart-outline-container'),
    heartOutline = $('#heart-outline'),

    barTop = $('#top'),
    barBottom = $('#bottom'),
    barLeft = $('#left'),
    barRight = $('#right'),

    fps = 60,
    now, then = Date.now(),
    interval = 1000 / fps,
    delta,

    particles = {},
    particleNum = 10,
    particleIndex = 0,
    hue = 350,
    hueInc = 0.5,
    rMult = 1,
    w, h,
    rInc,
    diagonalDistance = Math.sqrt(window.innerWidth**2 + window.innerHeight**2),
    startingOpacity = 0,
    opacityDirection = -1,
    particlesRendered = false;

heartOutline.imagesLoaded(function () {

    $(window).resize(function init() {

        diagonalDistance = Math.sqrt(window.innerWidth**2 + window.innerHeight**2);

        TweenMax.set(container, {
            opacity: 1,
            '-webkit-filter': `blur(${diagonalDistance * 0.01}px)`
        });

        TweenMax.set(c, {
            '-webkit-filter': `hue-rotate(${hue}deg)`
        });

        TweenMax.set(heartOutlineContainer, {
            width: diagonalDistance * 0.35
        });

        rInc = heartOutlineContainer.width() * 0.001;

        TweenMax.set(heartOutlineContainer, {
            y: window.innerHeight / 2 - heartOutlineContainer.height() / 2,
            x: window.innerWidth / 2 - heartOutlineContainer.width() / 2
        });

        // Bars
        let hw = heartOutline.width() * 0.005;

        TweenMax.set(barTop, {
            width: window.innerWidth,
            height: window.innerHeight,
            top: barTop.height() * -1 + hw,
            left: heartOutlineContainer.offset().left * -1
        });

        TweenMax.set(barBottom, {
            width: window.innerWidth,
            height: window.innerHeight,
            bottom: barBottom.height() * -1 + hw,
            left: heartOutlineContainer.offset().left * -1
        });

        TweenMax.set(barLeft, {
            width: window.innerWidth,
            height: window.innerHeight,
            left: barLeft.width() * -1 + hw,
            top: heartOutlineContainer.offset().top * -1
        });

        TweenMax.set(barRight, {
            width: window.innerWidth,
            height: window.innerHeight,
            right: barRight.width() * -1 + hw,
            top: heartOutlineContainer.offset().top * -1
        });

        c.width = $('#c').outerWidth();
        c.height = $('#c').outerHeight();

        w = c.width;
        h = c.height;

        cx.fillStyle = `rgba(${cbg.rgb},${cbg.a})`;
        cx.fillRect(0, 0, w, h);

        return init;
    }());
});

// Particle system
function drawCanvas() {

    function Particle() {
        this.r = random(heartOutlineContainer.width() * 0.01, heartOutlineContainer.width() * 0.05) * rMult;
        this.rInc = this.r * 0.05;

        this.x = random(
            heartOutlineContainer.offset().left - this.r,
            heartOutlineContainer.offset().left + heartOutlineContainer.width() - this.r
        );

        this.y = random(
            heartOutlineContainer.offset().top - this.r,
            heartOutlineContainer.offset().top + heartOutlineContainer.height() - this.r
        );

        this.hue = random(280, 320);
        this.saturation = 100;
        this.light = random(30, 100);
        this.opacity = startingOpacity;
        this.opacityDirection = opacityDirection;
        this.opacityInc = random(1, 10) * 0.001 * this.opacityDirection;

        particles[particleIndex] = this;
        this.id = particleIndex;
        particleIndex++;
    }

    Particle.prototype.draw = function () {
        this.r += this.rInc;
        this.rInc *= 0.99;

        this.opacity -= this.opacityInc;

        if (this.opacity > 1) this.opacityInc *= -1;
        if (this.opacity < 0.01) delete particles[this.id];

        cx.beginPath();
        cx.fillStyle = `hsla(${this.hue},${this.saturation}%,${this.light}%,${this.opacity})`;
        cx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        cx.fill();
    };

    function render() {
        requestAnimFrame(render);

        now = Date.now();
        delta = now - then;

        if (delta > interval) {
            then = now - (delta % interval);

            cx.globalCompositeOperation = 'source-over';
            cx.fillStyle = `rgba(${cbg.rgb},${cbg.a})`;
            cx.fillRect(0, 0, w, h);

            if (!particlesRendered) {
                for (let i = 0; i < particleNum; i++) new Particle();
            }

            for (let i in particles) particles[i].draw();

            hue += hueInc;

            TweenMax.set(c, {
                '-webkit-filter': `hue-rotate(${Math.floor(hue)}deg)`
            });
        }
    }

    render();
}

drawCanvas();

window.addEventListener('mousemove', function (e) {
    mouseX = e.clientX;
    mouseY = e.clientY;
}, false);
</script>

</body>
</html>
